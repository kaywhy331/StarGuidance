name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm db:check
      - run: pnpm build

  profile-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/profile-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: ruff check .
      - run: mypy .

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: python -m pip install -e "apps/profile-engine[dev]"
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

  migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: starguidance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d starguidance"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/starguidance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:check
      - run: pnpm --filter @starguidance/database exec drizzle-kit migrate
      - run: pnpm db:seed

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
