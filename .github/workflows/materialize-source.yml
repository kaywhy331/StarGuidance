name: Materialize source bundle

on:
  push:
    branches:
      - agent/implement-prd-foundation

permissions:
  contents: write

jobs:
  materialize:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify and extract source
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-* > /tmp/starguidance-src.tar.xz
          echo "9ea3945e035c57a8535e68205157567b1cba82c0b4e3ba13599ba813280d3fab  /tmp/starguidance-src.tar.xz" | sha256sum -c -
          tar -xJf /tmp/starguidance-src.tar.xz -C .
          rm -rf .bootstrap

      - name: Commit implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Implement StarGuidance PRD foundation"
          git push
